<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakat Perdagangan - Kawan Puasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <img src="../../assets/logo_kawan_puasa.png" width="150" alt="Logo">
            </div>
            <button class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="../../" class="nav-item">Home</a>
                <a href="../../features/1_fitur_doa/doa_berbuka.html" class="nav-item">Doa</a>
                <a href="../../features/2_fitur_dzikir/" class="nav-item">Dzikir</a>
                <a href="" class="nav-item active">Zakat</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-wrapper">
            <div class="hero-card">
                <div class="hero-text">
                    <h1>Perhitungan Zakat<br>Online</h1>
                    <p>Hitung zakat jadi lebih mudah dan cepat</p>
                </div>
                <img src="../../assets/ico_zakat.png" alt="Zakat" class="hero-img">
            </div>
        </section>

        <section class="container">
            <div class="zakat-menu">
                <a href="./" class="zakat-card">
                    <img src="../../assets/penghasilan_green.png" alt="">
                    Zakat<br>Penghasilan
                </a>
                <a href="./zakat_perusahaan.html" class="zakat-card">
                    <img src="../../assets/office_green.png" alt="">
                    Zakat<br>Perusahaan
                </a>
                <a href="./zakat_perdagangan.html" class="zakat-card active">
                    <img src="../../assets/perdagangan_white.png" alt="">
                    Zakat<br>Perdagangan
                </a>
                <a href="./zakat_emas.html" class="zakat-card">
                    <img src="../../assets/gold_green.png" alt="">
                    Zakat<br>Emas
                </a>
            </div>
        </section>

        <div class="bg-light">
            <section class="container">
                <h2 class="section-title" style="text-align: center; font-size: 2rem; margin-bottom: 2rem;">Zakat Perdagangan</h2>
                
                <div class="zakat-calc-container">
                    <div class="zakat-form">
                        
                        <div class="form-group">
                            <label class="form-label">Aset Lancar</label>
                            <div class="input-group">
                                <span class="input-addon">Rp</span>
                                <input type="text" class="input-zakat format-uang" id="aset-lancar" placeholder="Masukkan aset lancar">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Laba</label>
                            <div class="input-group">
                                <span class="input-addon">Rp</span>
                                <input type="text" class="input-zakat format-uang" id="laba" placeholder="Masukkan Laba">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Nisab per tahun</label>
                            <div class="input-group">
                                <span class="input-addon">Rp</span>
                                <input type="text" class="input-zakat" id="nisab-tahun" readonly>
                            </div>
                            <span class="form-note">Sesuai SK Ketua BAZNAS No. 15 tahun 2026</span>
                        </div>

                    </div>

                    <div class="zakat-result">
                        <h3>Jumlah Wajib Zakat (2.5%)</h3>
                        <input type="text" class="result-output" id="hasil-zakat" value="0" readonly>
                        <a href="https://bayarzakat.baznas.go.id/bayarzakat">
                            <button class="btn-bayar">Bayar Zakat</button>
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-logo">
            <img src="../../assets/logo_kawan_puasa.png" width="400" alt="Logo">
        </div>
        <hr>
        <p>&copy; 2026 Kawan Puasa.</p>
    </footer>

    <script src="../../js/zakat_perdagangan.js"></script>
    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('show');
        });
    </script>
</body>
</html>
